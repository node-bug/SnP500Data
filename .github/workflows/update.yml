name: Update S&P 500 List

on:
  schedule:
    - cron: "0 5 * * 1"  # daily at 05:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install axios cheerio

      - name: Run pipeline
        run: node src/index.js

      - name: Commit changes
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@example.com"
          git add data/*
          git commit -m "Daily S&P 500 update" || echo "No changes"
          git push
